<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap-4.0.0-dist/css/bootstrap.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
      <link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
</head>

<body>
    <div class="container"> 
        <h3 class="mt-3">Register</h3>
        <form action="/register" method="post" id="register-form">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" class="form-control inputField" id="email" name="email" required>
            
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" class="form-control inputField" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" class="form-control inputField" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
  
               <ol>
                <li><a href="/">Login</a></li>
                <li><a href="#">Forgot Password?</a></li>
            </ol>
        </form>
    </div>
    <script src="{{ url_for('static', filename='bootstrap-4.0.0-dist/js/bootstrap.js') }}"></script>
</body>

</html>
