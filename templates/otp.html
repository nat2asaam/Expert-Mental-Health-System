<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap-4.0.0-dist/css/bootstrap.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='otp.css') }}">
</head>

<body>
    <div class="container-fluid">
        <img src="{{url_for('static',filename='images/equicksalesemedics360banner.png')}}" class="img-fluid w-100" alt="Responsive Banner">
    </div>
    <div class="container"> 
        
        <h3 class="mt-3">Email OTP Verification</h3>
        <form action="/verify-otp" method="post" id="otp-form">
            <div class="form-group">
                <label for="email">Email address:</label>
                <input type="email" class="form-control inputField" id="email" name="email" required value="{{email}}">
            </div>
            <div class="form-group">
                <label for="otp">OTP:</label>
                <input type="text" class="form-control inputField" id="otp" name="otp" required>
            </div>
            <button type="submit" class="btn btn-primary">Verify OTP</button>
            <ol>
                <li><a href="/">Login</a></li>
                <li><a href="#">Forgot Password?</a></li>
            </ol>
        </form>
    </div>
    <script src="{{ url_for('static', filename='bootstrap-4.0.0-dist/js/bootstrap.js') }}"></script>
</body>

</html>
